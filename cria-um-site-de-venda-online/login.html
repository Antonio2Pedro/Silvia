<!doctype html>
<html lang="pt">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login | Passo Fino</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="auth-page">
    <main class="auth-shell">
      <section class="auth-panel">
        <a class="brand" href="index.html" aria-label="Voltar para Passo Fino">
          <span class="brand-mark">PF</span>
          <span>Passo Fino</span>
        </a>

        <div class="auth-copy">
          <p class="eyebrow">Area administrativa</p>
          <h1>Entrar no painel</h1>
          <p>Use o login para adicionar imagens e informacoes dos calcados da loja.</p>
        </div>

        <form class="auth-form" id="loginForm">
          <label>
            <span>Usuario</span>
            <input id="username" type="text" autocomplete="username" placeholder="" required />
          </label>
          <label>
            <span>Senha</span>
            <input id="password" type="password" autocomplete="current-password" placeholder="" required />
          </label>
          <p class="form-alert" id="loginAlert" role="alert"></p>
          <button class="checkout-button" type="submit">Entrar</button>
        </form>
      </section>

      <section class="auth-image" aria-label="Calcado em destaque">
        <img
          src="https://tse4.mm.bing.net/th/id/OIP.nY_CZ_Agq21qN6C9_xcD7wHaHa?r=0&rs=1&pid=ImgDetMain&o=7&rm=3"
          alt=""
        />
      </section>
    </main>

   <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>

<script>
const form = document.querySelector("#loginForm");
const alertBox = document.querySelector("#loginAlert");

form.addEventListener("submit", async (event) => {

  event.preventDefault();

  const email = document.querySelector("#username").value.trim();
  const password = document.querySelector("#password").value.trim();

  const { error } = await supabaseClient.auth.signInWithPassword({
    email,
    password
  });

  if (error) {
    alertBox.textContent = error.message;
    return;
  }

  window.location.href = "admin.html";
});
</script>
  </body>
</html>
